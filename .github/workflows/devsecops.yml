name: Pipeline DevSecOps - Sistema de Gerenciamento

on:
  push:
    branches: [ "main", "stage", "development" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "stage" ]

jobs:
  # ==========================================
  # ETAPA 3: INTEGRAÇÃO CONTÍNUA (CI)
  # ==========================================
  continuous-integration:
    name: Compilação e Testes Automatizados
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Testes Unitários e Integração
        run: |
          # Executa os testes da aplicação (ex: pytest ou unittest)
          python -m unittest discover -s tests || echo "Nenhum teste configurado ainda."

  # ==========================================
  # ETAPA 4: ANÁLISE ESTÁTICA DE SEGURANÇA (SAST)
  # ==========================================
  sast-security:
    name: Análise Estática (Bandit & Dependency-Check)
    runs-on: ubuntu-latest
    needs: continuous-integration
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      # 4.1 Bandit para código Python
      - name: Executar Bandit (SAST)
        run: |
          pip install bandit
          # Executa a análise ignorando erros fatais para não quebrar o report inicial
          bandit -r . -f json -o bandit-report.json || true
        
      - name: Upload Report Bandit
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-bandit
          path: bandit-report.json

      # 4.2 OWASP Dependency-Check para bibliotecas desatualizadas
      - name: OWASP Dependency-Check
        uses: dependency-check/DependencyCheck-action@main
        with:
          project: 'Task-Manager-Flask'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: '--failOnCVSS 7' # Falha o pipeline se houver vulnerabilidade Alta/Crítica

      - name: Upload Report Dependency-Check
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-dependencias
          path: reports

  # ==========================================
  # ETAPAS 5 & 6: ENTREGA CONTÍNUA & DAST
  # ==========================================
  dynamic-analysis-and-deploy:
    name: Deploy em Stage e Análise Dinâmica (DAST)
    runs-on: ubuntu-latest
    needs: sast-security
    if: github.ref == 'refs/heads/stage' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Construir e Rodar a Aplicação em Docker (Ambiente Temporário/Stage)
        run: |
          docker build -t task-manager-app .
          docker run -d -p 5000:5000 --name app-stage task-manager-app
          # Aguarda a aplicação subir completamente
          sleep 10

      # 5.1 Teste de Penetração Automatizado com OWASP ZAP (DAST)
      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:5000'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          fail_action: false # Define como true se quiser bloquear deploys com falhas DAST

      - name: Desligar Container de Teste
        run: docker stop app-stage && docker rm app-stage

      # 6.1 Simulação de Deploy em Produção (CD)
      - name: Deploy em Produção
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Implantando aplicação no ambiente produtivo..."
          # Aqui entrariam os comandos de infraestrutura (Ex: AWS, Azure, DigitalOcean ou Kubernetes)
          echo "Deploy realizado com sucesso com a tag: ${{ github.ref_name }}"